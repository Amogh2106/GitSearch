<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header -->
    <header>
        <span class="logo">GitLook</span><br>
        <div>
            <input type="text" id="search-input" placeholder="Enter your username ...">
            <button id="search-btn" onclick="fetchData()">Search</button>
        </div>
    </header>
    <main>
        <div id="error" class="hidden">User Not Found</div>
        <!-- PROFILE CARD -->
        <section id="profile" class="hidden">
            <div id="profile-card">
                <img src="pic.avif" id="avatar" alt="">
                <div class="profile-info">
                    <!-- <h1 id="name">Name</h1> -->
                    <p id="username"></p>
                    <p id="bio"></p>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span id="repos-count">0</span>
                    <label>Repos</label>
                </div>
                <div class="stat">
                    <span id="followers-count">0</span>
                    <label>Followers</label>
                </div>
                <div class="stat">
                    <span id="following-count">0</span>
                    <label>Following</label>
                </div>
            </div>
        </section>

        <!-- REPOS LIST -->
        <section id="repos" class="">
            <h2>Repositories</h2>
            <ul id="repos-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>

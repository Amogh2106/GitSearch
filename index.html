<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header -->
    <header>
        <span class="logo">GitLook</span><br>
        <div>
            <input type="text" id="search-input" placeholder="Enter your username ...">
            <button id="search-btn">Search</button>
        </div>
    </header>
    <main>
        <!-- PROFILE CARD -->
        <section id="profile" class="hidden">
            <div id="profile-card">
                <img src="" id="avatar" alt="">
                <div class="profile-info">
                    <h1 id="name"></h1>
                    <p id="username"></p>
                    <p id="bio"></p>
                </div>
            </div>
            <div class="stats">
                <div class="stat">'
                    <span id="repos-count">0</span>
                    <label for="">Following</label>
                </div>
            </div>
        </section>

        <!-- REPOS LIST -->
        <section id="repos" class="hidden">
            <h2>Repositories</h2>
            <ul id="respos-list"></ul>
        </section>
        <!-- STATES -->
        <div id="loading" class="hidden">Loading...</div>
        <div id="error" class="hidden">User Not Found</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
